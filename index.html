<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="projeto, calculadora, calculadora online, calc, matemática, math">
    <meta name="author" content="Gabriel S. Duarte">
    <link rel="stylesheet" href="./css/style.css">
    <title>Calculadora Web</title>
</head>

<body>
    <div class="calculadora">

        <img src="./public/casio_logo.png" width="125" height="27">

        <input type="text" class="display" id="display" readonly>

        <div class="botoes">
            <button type="button" class="memoria" data-valor="MC">MC</button>
            <button type="button" class="memoria" data-valor="MR">MR</button>
            <button type="button" class="memoria" data-valor="M-">M-</button>
            <button type="button" class="memoria" data-valor="M+">M+</button>

            <button type="button" class="extra" data-valor="AC">AC</button>
            <button type="button" class="extra" data-valor="C">C</button>
            <button type="button" class="extra" data-valor="+/-">+/-</button>
            <button type="button" class="extra" data-valor="%">%</button>

            <button type="button" class="numero" data-valor="7">7</button>
            <button type="button" class="numero" data-valor="8">8</button>
            <button type="button" class="numero" data-valor="9">9</button>
            <button type="button" class="operacao" data-valor="/">÷</button>

            <button type="button" class="numero" data-valor="4">4</button>
            <button type="button" class="numero" data-valor="5">5</button>
            <button type="button" class="numero" data-valor="6">6</button>
            <button type="button" class="operacao" data-valor="*">×</button>

            <button type="button" class="numero" data-valor="4">1</button>
            <button type="button" class="numero" data-valor="5">2</button>
            <button type="button" class="numero" data-valor="6">3</button>
            <button type="button" class="operacao" data-valor="*">-</button>

            <button type="button" class="numero" data-valor="0">0</button>
            <button type="button" class="numero" data-valor=".">.</button>
            <button type="button" class="operacao" data-valor="=">=</button>
            <button type="button" class="operacao" data-valor="+">+</button>
        </div>

    </div>
</body>

</html>
